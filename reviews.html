<script>
function updateClock() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;
  if (s < 10) s = "0" + s;

  document.getElementById("clock").innerText =
    h + ":" + m + ":" + s;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</main>

<script>
function loadPDF(file) {
  document.getElementById("pdfViewer").src = file;
}
</script>
